services:
  db:
    container_name: mysql
    restart: always
    env_file:
      - .env
    build:
      context: .docker/mysql
      dockerfile: Dockerfile.dev
    ports:
      - "3306:3306"
    volumes:
      - "mysql:/var/lib/mysql:Z"
    networks:
      - backend-network

  api:
    container_name: php-fpm
    restart: always
    build:
      context: .docker/php
      dockerfile: Dockerfile.dev
      args:
        TIMEZONE: ${TIMEZONE}
    env_file:
      - .env
    volumes:
      - ./api/:/var/www/html/api:rw,Z
      - .docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini:Z
    depends_on:
      - db
    networks:
      - backend-network

  server:
    container_name: caddy
    restart: unless-stopped
    build:
      context: .docker/caddy
      dockerfile: Dockerfile.dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api/:/var/www/html/api:rw,Z
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - backend-network

volumes:
  mysql:
  caddy_data:
  caddy_config:

networks:
  backend-network:
    name: backend-network
